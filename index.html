<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #ccc;
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #1e1e1e;
  }
  header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #ccc; }
  #header-actions { display: flex; align-items: center; gap: 8px; }
  header a, #tags-manager-btn, #open-upload-btn {
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff; text-decoration: none; padding: 6px 14px; border: 1px solid #555; border-radius: 4px;
    transition: border-color 0.15s; background: none; cursor: pointer; font-family: inherit;
  }
  header a:hover, #tags-manager-btn:hover, #open-upload-btn:hover { border-color: #aaa; }

  /* Upload modal */
  #upload-modal {
    border: none; background: transparent; padding: 0;
    max-width: 100vw; max-height: 100vh; width: 100vw; height: 100vh; outline: none;
  }
  #upload-modal::backdrop { background: rgba(0,0,0,0.65); cursor: pointer; }
  #um-wrap {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 500px; max-width: 100vw;
    background: #0d0d0d; border-left: 1px solid #1e1e1e;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #um-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
  }
  #um-header span { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #ccc; }
  #um-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; line-height: 1; padding: 0; transition: color 0.15s; }
  #um-close:hover { color: #fff; }
  #um-body { flex: 1; overflow-y: auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: #2a2a2a transparent; }
  #um-body::-webkit-scrollbar { width: 4px; }
  #um-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  #um-drop-zone {
    border: 1px dashed #2a2a2a; border-radius: 6px; padding: 52px 24px;
    text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    position: relative; flex-shrink: 0;
  }
  #um-drop-zone.over { border-color: #555; background: #141414; }
  #um-drop-zone p { font-size: 13px; color: #aaa; letter-spacing: 0.04em; pointer-events: none; }
  #um-drop-zone p span { display: block; margin-top: 6px; font-size: 11px; color: #888; }
  #um-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  #um-tags-section label { display: block; font-size: 11px; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  #um-tag-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  #um-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  #um-tag-input {
    width: 100%; background: #111; border: 1px solid #1e1e1e; border-radius: 4px;
    color: #ccc; font-size: 13px; padding: 8px 11px; outline: none; font-family: inherit;
  }
  #um-tag-input:focus { border-color: #555; }
  #um-tag-input::placeholder { color: #666; }

  .tag-suggestion {
    padding: 4px 10px; background: none; border: 1px solid #3a3a3a; border-radius: 20px;
    font-size: 12px; color: #999; cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .tag-suggestion:hover { border-color: #666; color: #e0e0e0; }
  .tag-suggestion.active { border-color: #aaa; color: #fff; background: #1a1a1a; }
  .tags-chip { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: #1a1a1a; border-radius: 20px; font-size: 12px; color: #ccc; border: 1px solid #3a3a3a; }
  .tags-chip-rm { background: none; border: none; color: #888; cursor: pointer; font-size: 15px; line-height: 1; padding: 0 0 0 2px; }
  .tags-chip-rm:hover { color: #fff; }

  #um-flow-row { display: flex; align-items: center; gap: 10px; }
  #um-flow-toggle {
    display: flex; align-items: center; gap: 8px;
    background: none; border: 1px solid #3a3a3a; border-radius: 4px;
    color: #999; font-size: 12px; padding: 7px 14px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.04em; transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  #um-flow-toggle:hover { border-color: #666; color: #ddd; }
  #um-flow-toggle.on { border-color: #aaa; color: #fff; }
  #um-flow-toggle .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; transition: background 0.15s; flex-shrink: 0; }
  #um-flow-toggle.on .dot { background: #fff; }
  #um-flow-name {
    flex: 1; display: none; background: #111; border: 1px solid #1e1e1e;
    border-radius: 4px; color: #ccc; font-size: 13px; padding: 7px 11px;
    outline: none; font-family: inherit;
  }
  #um-flow-name.visible { display: block; }
  #um-flow-name:focus { border-color: #555; }
  #um-flow-name::placeholder { color: #666; }

  .um-preview-item {
    display: grid; grid-template-columns: 52px 1fr auto;
    align-items: center; gap: 12px;
    background: #111; border-radius: 4px; padding: 10px 12px; border: 1px solid #1a1a1a;
  }
  .um-preview-item img, .um-preview-item video { width: 52px; height: 40px; object-fit: cover; border-radius: 3px; background: #1a1a1a; }
  .um-preview-info { overflow: hidden; }
  .um-preview-name { font-size: 12px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .um-preview-size { font-size: 10px; color: #888; margin-top: 3px; }
  .um-preview-bar-wrap { height: 2px; background: #1e1e1e; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .um-preview-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.15s; }
  .um-preview-state { font-size: 11px; color: #999; white-space: nowrap; min-width: 54px; text-align: right; }
  .um-preview-state.ok { color: #6abf6a; }
  .um-preview-state.err { color: #cc5555; }

  #um-upload-btn {
    padding: 10px 28px; background: #fff; color: #0d0d0d; border: none;
    border-radius: 4px; font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; font-family: inherit;
  }
  #um-upload-btn:disabled { opacity: 0.3; cursor: default; }
  #um-status { font-size: 12px; color: #888; letter-spacing: 0.04em; min-height: 16px; }

  /* Filter bar */
  #filter-bar {
    position: sticky;
    top: 49px;
    z-index: 9;
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
    scrollbar-width: none;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #181818;
  }
  #filter-bar:empty { display: none; }
  #filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; padding: 9px 24px; border-radius: 9999px; border: 1px solid #3a3a3a;
    background: none; color: #999; font-size: 18px; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit;
  }
  .filter-btn:hover { border-color: #666; color: #e0e0e0; }
  .filter-btn.active { background: #fff; color: #0d0d0d; border-color: #fff; }
  .filter-btn.has-children::after { content: '›'; margin-left: 5px; opacity: 0.35; font-size: 12px; }

  #subtag-bar {
    display: none;
    position: sticky;
    top: 106px;
    z-index: 8;
    gap: 6px;
    padding: 7px 14px 7px 22px;
    overflow-x: auto;
    scrollbar-width: none;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #181818;
  }
  #subtag-bar.visible { display: flex; }
  #subtag-bar::-webkit-scrollbar { display: none; }
  .subtag-btn {
    flex-shrink: 0; padding: 5px 14px; border-radius: 9999px;
    border: 1px solid #3a3a3a; background: none; color: #888;
    font-size: 11px; letter-spacing: 0.05em; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; font-family: inherit;
  }
  .subtag-btn:hover { border-color: #666; color: #ddd; }
  .subtag-btn.active { background: rgba(255,255,255,0.08); color: #ddd; border-color: #666; }

  #status { text-align: center; padding: 80px 24px; font-size: 13px; color: #777; letter-spacing: 0.05em; }

  /* Grid */
  #grid { columns: 10; column-gap: 2px; padding: 2px; }
  @media (max-width: 1100px) { #grid { columns: 7; } }
  @media (max-width: 700px)  { #grid { columns: 4; } }

  .thumb {
    position: relative; break-inside: avoid; margin-bottom: 3px;
    overflow: hidden; cursor: pointer; background: #111; display: block;
  }
  .thumb img { width: 100%; height: auto; display: block; transition: transform 0.35s ease, opacity 0.3s; opacity: 0; }
  .thumb img.loaded { opacity: 1; }
  .thumb:hover img { transform: scale(1.03); }
  .thumb video { width: 100%; height: auto; display: block; transition: transform 0.35s ease; }
  .thumb:hover video { transform: scale(1.03); }

  /* Lightbox */
  #lightbox {
    border: none; background: transparent; padding: 0;
    max-width: 100vw; max-height: 100vh; outline: none;
  }
  #lightbox::backdrop { background: rgba(0,0,0,0.93); cursor: pointer; }

  #lb-wrap {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100vw; height: 100vh; gap: 16px; position: relative;
  }

  #lb-img, #lb-video {
    max-width: 88vw; max-height: 78vh;
    object-fit: contain; border-radius: 2px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }
  #lb-video { display: none; background: #000; }

  #lb-close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; color: #999; font-size: 28px;
    cursor: pointer; line-height: 1; transition: color 0.15s;
  }
  #lb-close:hover { color: #fff; }

  #lb-footer {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }

  #lb-name { font-size: 11px; color: #777; letter-spacing: 0.06em; }

  #lb-tags {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    max-width: 600px;
  }

  .lb-tag {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: #ccc; letter-spacing: 0.04em;
    cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .lb-tag:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.15); }

  #lb-footer-actions { display: flex; gap: 8px; }

  #lb-edit-btn, #lb-delete-btn {
    background: none; border: 1px solid #2a2a2a; border-radius: 4px;
    font-size: 11px; padding: 5px 14px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.05em; transition: color 0.15s, border-color 0.15s;
  }
  #lb-edit-btn { color: #bbb; border-color: #555; }
  #lb-edit-btn:hover { color: #fff; border-color: #aaa; }
  #lb-delete-btn { color: #c04040; border-color: #5a2a2a; }
  #lb-delete-btn:hover { color: #ff6666; border-color: #a04040; }

  /* Notes */
  #lb-notes-wrap { max-width: 520px; width: 100%; text-align: center; }
  .lb-notes-text {
    font-size: 13px; color: #999; line-height: 1.65; letter-spacing: 0.02em;
    white-space: pre-wrap; word-break: break-word; cursor: pointer;
    transition: color 0.15s;
  }
  .lb-notes-text:hover { color: #ddd; }
  .lb-notes-empty {
    background: none; border: none; font-size: 11px; color: #777;
    letter-spacing: 0.07em; cursor: pointer; font-family: inherit;
    transition: color 0.15s; text-transform: uppercase;
  }
  .lb-notes-empty:hover { color: #bbb; }
  #lb-notes-textarea {
    width: 100%; background: #161616; border: 1px solid #333; border-radius: 8px;
    color: #ccc; font-size: 13px; padding: 10px 12px; outline: none;
    font-family: inherit; resize: vertical; min-height: 72px; line-height: 1.6;
  }
  #lb-notes-textarea:focus { border-color: #555; }
  #lb-notes-textarea::placeholder { color: #666; }
  .lb-notes-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

  /* Tag editor */
  #tag-editor {
    background: #161616; border: 1px solid #2a2a2a; border-radius: 10px;
    padding: 22px; width: 360px; max-width: 92vw;
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); margin: 0;
  }
  #tag-editor::backdrop { background: rgba(0,0,0,0.75); }
  #tag-editor h3 { font-size: 11px; font-weight: 500; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
  #te-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .te-suggestion {
    padding: 4px 10px; background: none; border: 1px solid #3a3a3a; border-radius: 20px;
    font-size: 12px; color: #999; cursor: pointer; font-family: inherit;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .te-suggestion:hover { border-color: #666; color: #e0e0e0; }
  .te-suggestion.active { border-color: #aaa; color: #fff; background: #1a1a1a; }
  .te-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; margin-bottom: 14px; }
  .te-chip { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: #222; border-radius: 20px; font-size: 12px; color: #ddd; }
  .te-chip-rm { background: none; border: none; color: #666; cursor: pointer; font-size: 15px; line-height: 1; padding: 0 0 0 2px; }
  .te-chip-rm:hover { color: #fff; }
  .te-chip-edit { background: none; border: none; color: #666; cursor: pointer; font-size: 12px; line-height: 1; padding: 0 3px; transition: color 0.12s; }
  .te-chip-edit:hover { color: #ddd; }
  .te-input-row { display: flex; gap: 8px; margin-bottom: 18px; }
  .te-input-row input {
    flex: 1; background: #111; border: 1px solid #252525; border-radius: 6px;
    color: #ccc; font-size: 13px; padding: 8px 11px; outline: none; font-family: inherit;
  }
  .te-input-row input:focus { border-color: #555; }
  .te-input-row input::placeholder { color: #555; }
  .te-add-btn { padding: 8px 14px; background: #1e1e1e; border: 1px solid #444; border-radius: 6px; color: #ddd; font-size: 12px; cursor: pointer; font-family: inherit; }
  .te-add-btn:hover { color: #fff; border-color: #666; }
  .te-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .te-cancel { padding: 8px 18px; background: none; border: 1px solid #444; border-radius: 6px; color: #aaa; font-size: 12px; cursor: pointer; font-family: inherit; }
  .te-cancel:hover { color: #fff; border-color: #777; }
  .te-save { padding: 8px 20px; background: #fff; border: none; border-radius: 6px; color: #0d0d0d; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .te-save:hover { opacity: 0.88; }

  /* Tag description panel */
  #tag-desc-panel {
    display: none;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 24px 14px;
    border-bottom: 1px solid #181818;
    background: #0d0d0d;
  }
  #tag-desc-panel.visible { display: flex; }
  #tag-desc-panel-body { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  #tag-desc-title {
    font-size: 11px;
    font-weight: 600;
    color: #ccc;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  #tag-desc-text {
    font-size: 12px;
    color: #888;
    line-height: 1.7;
    letter-spacing: 0.02em;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #tag-desc-text.empty { color: #555; font-style: italic; }
  #tag-desc-text a { color: #888; text-decoration: underline; text-underline-offset: 2px; }
  #tag-desc-text a:hover { color: #bbb; }
  #tag-desc-edit {
    flex-shrink: 0;
    background: none;
    border: none;
    color: #777;
    font-size: 15px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    margin-top: 1px;
    transition: color 0.15s;
  }
  #tag-desc-edit:hover { color: #fff; }

  /* Description editor dialog */
  #desc-editor {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 22px;
    width: 420px;
    max-width: 92vw;
  }
  #desc-editor::backdrop { background: rgba(0,0,0,0.75); }
  #desc-editor h3 { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
  #desc-editor p.hint { font-size: 11px; color: #777; margin-bottom: 10px; letter-spacing: 0.02em; }
  #desc-textarea {
    width: 100%;
    background: #111;
    border: 1px solid #252525;
    border-radius: 6px;
    color: #ccc;
    font-size: 13px;
    padding: 10px 11px;
    outline: none;
    font-family: inherit;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  #desc-textarea:focus { border-color: #555; }
  #desc-textarea::placeholder { color: #666; }

  /* Tags Manager dialog */
  #tags-manager {
    background: #161616; border: 1px solid #2a2a2a; border-radius: 10px;
    padding: 0; width: 560px; max-width: 95vw; max-height: 80vh;
    overflow: hidden;
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); margin: 0;
  }
  #tags-manager[open] { display: flex; flex-direction: column; }
  #tags-manager::backdrop { background: rgba(0,0,0,0.82); }
  #tm-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px 14px; border-bottom: 1px solid #222; flex-shrink: 0;
  }
  #tm-header h3 { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }
  #tm-close { background: none; border: none; color: #888; font-size: 22px; cursor: pointer; line-height: 1; padding: 0; transition: color 0.15s; }
  #tm-close:hover { color: #ccc; }
  #tm-new { display: flex; gap: 8px; padding: 14px 22px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; }
  #tm-new-name {
    flex: 1; background: #111; border: 1px solid #222; border-radius: 5px;
    color: #ccc; font-size: 13px; padding: 7px 11px; outline: none; font-family: inherit;
  }
  #tm-new-name:focus { border-color: #444; }
  #tm-new-name::placeholder { color: #666; }
  #tm-new-add {
    padding: 7px 16px; background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 5px;
    color: #bbb; font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: color 0.15s, border-color 0.15s;
  }
  #tm-new-add:hover { color: #fff; border-color: #666; }
  #tm-list { overflow-y: auto; flex: 1; padding: 6px 0; }
  #tm-list::-webkit-scrollbar { width: 3px; }
  #tm-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
  .tm-empty { text-align: center; padding: 40px 24px; font-size: 13px; color: #666; letter-spacing: 0.04em; }
  .tm-row { padding: 12px 22px; border-bottom: 1px solid #1c1c1c; }
  .tm-row:last-child { border-bottom: none; }
  .tm-row-top { display: flex; align-items: center; gap: 10px; }
  .tm-tag-name { font-size: 13px; color: #ccc; font-weight: 500; flex: 1; }
  .tm-tag-count { font-size: 10px; color: #666; letter-spacing: 0.05em; white-space: nowrap; }
  .tm-row-actions { display: flex; gap: 2px; }
  .tm-rename-btn, .tm-edit-btn, .tm-del-btn {
    background: none; border: none; cursor: pointer; font-size: 14px;
    padding: 3px 7px; border-radius: 3px; transition: color 0.15s, background 0.15s; line-height: 1;
  }
  .tm-rename-btn { color: #777; font-size: 11px; letter-spacing: 0.03em; }
  .tm-rename-btn:hover { color: #fff; background: #222; }
  .tm-edit-btn { color: #777; }
  .tm-edit-btn:hover { color: #fff; background: #222; }
  .tm-del-btn { color: #a05050; }
  .tm-del-btn:hover { color: #ff6666; background: #2a1a1a; }
  .tm-desc-view { font-size: 11px; color: #666; margin-top: 5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .tm-desc-view.has-content { color: #888; }
  .tm-desc-edit { margin-top: 8px; }
  .tm-desc-ta {
    width: 100%; background: #111; border: 1px solid #252525; border-radius: 5px;
    color: #ccc; font-size: 12px; padding: 8px 10px; outline: none; font-family: inherit;
    resize: vertical; min-height: 70px; line-height: 1.5;
  }
  .tm-desc-ta:focus { border-color: #333; }
  .tm-edit-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }

  /* Drop overlay */
  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(13,13,13,0.88);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    border: 2px dashed #333;
    pointer-events: none;
  }
  #drop-overlay.active { display: flex; pointer-events: auto; }
  #drop-overlay p { font-size: 20px; color: #ddd; letter-spacing: 0.1em; text-transform: uppercase; }
  #drop-overlay span { font-size: 12px; color: #555; letter-spacing: 0.06em; }

  /* Flow cards */
  .flow-badge {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.72); color: #ddd;
    font-size: 10px; padding: 3px 8px; border-radius: 3px;
    letter-spacing: 0.04em; pointer-events: none; z-index: 2;
  }
  .flow-thumbs {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; gap: 2px; padding: 4px 5px;
    background: linear-gradient(transparent, rgba(0,0,0,0.55));
    pointer-events: none; z-index: 2;
  }
  .flow-thumb-mini {
    flex: 1; min-width: 0; height: 22px; border-radius: 2px;
    object-fit: cover;
    display: block;
  }
  .thumb img.flow-thumb-mini { opacity: 1; }
  .thumb.flow-card::before {
    content: ''; position: absolute; inset: 0;
    background: #1a1a1a; z-index: -1; border-radius: 2px;
    transform: translate(3px, 3px) scale(0.96);
  }

  /* Flow lightbox */
  #flow-lb {
    border: none; background: transparent; padding: 0;
    max-width: 100vw; max-height: 100vh; width: 100vw; height: 100vh; outline: none;
  }
  #flow-lb::backdrop { background: rgba(0,0,0,0.95); }
  #flow-lb-wrap {
    display: flex; flex-direction: column; width: 100vw; height: 100vh;
    position: relative; align-items: center; justify-content: center;
  }
  #flow-track {
    display: flex; gap: 24px;
    overflow-x: auto; overflow-y: hidden;
    padding: 24px 60px; align-items: flex-start;
    max-width: 100vw; width: 100%;
    scrollbar-width: thin; scrollbar-color: #444 transparent;
  }
  #flow-track::-webkit-scrollbar { height: 4px; }
  #flow-track::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
  .flow-slide {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .flow-slide img, .flow-slide video {
    max-height: 68vh; max-width: 72vw; object-fit: contain; border-radius: 2px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6); display: block;
  }
  #flow-lb-close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; color: #999; font-size: 28px;
    cursor: pointer; line-height: 1; z-index: 10; transition: color 0.15s;
  }
  #flow-lb-close:hover { color: #fff; }
  .flow-slide-footer { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .flow-slide-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; max-width: 360px; }
  .flow-slide-actions { display: flex; gap: 6px; }
  .flow-slide-edit-btn, .flow-slide-del-btn {
    background: none; border: 1px solid #3a3a3a; border-radius: 4px;
    font-size: 11px; padding: 4px 12px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.05em; transition: color 0.15s, border-color 0.15s;
  }
  .flow-slide-edit-btn { color: #bbb; }
  .flow-slide-edit-btn:hover { color: #fff; border-color: #777; }
  .flow-slide-del-btn { color: #c04040; border-color: #5a2a2a; }
  .flow-slide-del-btn:hover { color: #ff6666; border-color: #a04040; }
</style>
</head>
<body>

<div id="drop-overlay">
  <p>Drop to upload</p>
</div>

<header>
  <h1>Refs</h1>
  <div id="header-actions">
    <button id="tags-manager-btn">Tags</button>
    <button id="open-upload-btn">+ Upload</button>
  </div>
</header>

<div id="filter-bar"></div>
<div id="subtag-bar"></div>
<div id="tag-desc-panel">
  <div id="tag-desc-panel-body">
    <span id="tag-desc-title"></span>
    <p id="tag-desc-text"></p>
  </div>
  <button id="tag-desc-edit" title="Edit description">✎</button>
</div>
<div id="status">Loading…</div>
<div id="grid"></div>

<dialog id="lightbox">
  <div id="lb-wrap">
    <button id="lb-close" aria-label="Close">×</button>
    <img id="lb-img" src="" alt="">
    <video id="lb-video" controls playsinline></video>
    <div id="lb-footer">
      <span id="lb-name"></span>
      <div id="lb-tags"></div>
      <div id="lb-notes-wrap"></div>
      <div id="lb-footer-actions">
        <button id="lb-edit-btn">✏ Edit tags</button>
        <button id="lb-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</dialog>

<dialog id="tags-manager">
  <div id="tm-header">
    <h3>Tags</h3>
    <button id="tm-close">×</button>
  </div>
  <div id="tm-new">
    <input id="tm-new-name" type="text" placeholder="Nuevo tag…">
    <button id="tm-new-add">+ Añadir</button>
  </div>
  <div id="tm-list"></div>
</dialog>

<dialog id="desc-editor">
  <h3 id="desc-editor-title">Description</h3>
  <p class="hint">URLs se convierten en links automáticamente.</p>
  <textarea id="desc-textarea" placeholder="Escribe una descripción…"></textarea>
  <div class="te-actions">

</dialog>

<dialog id="tag-editor">
  <h3>Tags</h3>
  <div id="te-suggestions"></div>
  <div id="te-chips" class="te-chips"></div>
  <div class="te-input-row">
    <input id="te-input" type="text" placeholder="Add a tag…">
    <button class="te-add-btn" id="te-add">Add</button>
  </div>
  <div class="te-actions">
    <button class="te-cancel" id="te-cancel">Cancel</button>
    <button class="te-save" id="te-save">Save</button>
  </div>
</dialog>

<dialog id="upload-modal">
  <div id="um-wrap">
    <div id="um-header">
      <span>Upload</span>
      <button id="um-close">×</button>
    </div>
    <div id="um-body">
      <div id="um-drop-zone">
        <input type="file" id="um-file-input" multiple accept="image/*,video/*">
        <p>Drop or click to browse
          <span>PNG, JPG, GIF, WEBP, MP4, WEBM, MOV · no limit per file</span>
        </p>
      </div>
      <div id="um-tags-section" style="display:none">
        <label>Tags — applied to all files</label>
        <div id="um-tag-suggestions"></div>
        <div id="um-chips"></div>
        <input id="um-tag-input" type="text" placeholder="Add a tag and press Enter…">
      </div>
      <div id="um-flow-section" style="display:none">
        <div id="um-flow-row">
          <button id="um-flow-toggle"><span class="dot"></span>Group as Flow</button>
          <input id="um-flow-name" type="text" placeholder="Flow name (optional)">
        </div>
      </div>
      <div id="um-previews"></div>
      <div id="um-actions" style="display:none">
        <button id="um-upload-btn">Upload</button>

</dialog>

<dialog id="flow-lb">
  <div id="flow-lb-wrap">
    <button id="flow-lb-close">×</button>
    <div id="flow-track"></div>
  </div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase  = createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET    = 'images';
const grid      = document.getElementById('grid');
const status    = document.getElementById('status');
const filterBar = document.getElementById('filter-bar');
const lb        = document.getElementById('lightbox');
const lbImg     = document.getElementById('lb-img');
const lbVideo   = document.getElementById('lb-video');
const lbName    = document.getElementById('lb-name');
const lbTags    = document.getElementById('lb-tags');
const lbEditBtn    = document.getElementById('lb-edit-btn');
const lbNotesWrap  = document.getElementById('lb-notes-wrap');
const tagDlg       = document.getElementById('tag-editor');
const teChips      = document.getElementById('te-chips');
const teSuggestions = document.getElementById('te-suggestions');
const teInput      = document.getElementById('te-input');

let metaMap       = {};
let notesMap      = {};
let tagDescMap    = {};
let fileFlowMap   = {};
let flowDataMap   = {};
let thumbRegistry = [];
let currentFilter = null;
let lbFilename    = null;
let editTags      = [];

// ── Load ─────────────────────────────────────────────────────────────────────

async function load() {
  grid.innerHTML = '';
  thumbRegistry = [];
  metaMap = {}; notesMap = {}; tagDescMap = {};
  fileFlowMap = {}; flowDataMap = {};
  status.textContent = 'Loading…'; status.style.display = '';

  const [storageRes, metaRes, tagDescRes, flowsRes] = await Promise.all([
    supabase.storage.from(BUCKET).list('', { limit: 500, sortBy: { column: 'created_at', order: 'desc' } }),
    supabase.from('image_meta').select('filename, tags, notes, flow_id'),
    supabase.from('tag_meta').select('tag, description'),
    supabase.from('flows').select('id, name')
  ]);

  if (storageRes.error) { status.textContent = 'Error: ' + storageRes.error.message; return; }

  for (const row of (metaRes.data || [])) {
    metaMap[row.filename]  = row.tags  || [];
    notesMap[row.filename] = row.notes || '';
    if (row.flow_id) fileFlowMap[row.filename] = row.flow_id;
  }

  for (const row of (tagDescRes.data || [])) {
    tagDescMap[row.tag] = row.description || '';
  }

  for (const row of (flowsRes.data || [])) {
    flowDataMap[row.id] = { name: row.name || '' };
  }

  const imgs = (storageRes.data || []).filter(f => /\.(png|jpe?g|gif|webp|avif|svg|mp4|webm|mov|m4v|ogv)$/i.test(f.name));
  if (!imgs.length) { status.textContent = 'No images yet. Upload some!'; return; }
  status.style.display = 'none';

  const seenFlows = new Set();
  for (const file of imgs) {
    const { data: { publicUrl } } = supabase.storage.from(BUCKET).getPublicUrl(file.name);
    const flowId = fileFlowMap[file.name];

    if (flowId) {
      if (seenFlows.has(flowId)) continue;
      seenFlows.add(flowId);
      const flowFiles = imgs.filter(f => fileFlowMap[f.name] === flowId);
      const card = buildFlowCard(flowId, flowFiles, flowDataMap[flowId]?.name || '');
      thumbRegistry.push({ el: card, filename: file.name, isFlow: true, flowId, flowFilenames: flowFiles.map(f => f.name) });
      grid.appendChild(card);
    } else {
      const card = buildThumb(publicUrl, file.name);
      thumbRegistry.push({ el: card, filename: file.name });
      grid.appendChild(card);
    }
  }

  buildFilterBar();
}

// ── Thumb ─────────────────────────────────────────────────────────────────────

function isVideo(filename) {
  return /\.(mp4|webm|mov|m4v|ogv)$/i.test(filename);
}

function buildThumb(url, filename) {
  const card = document.createElement('div');
  card.className = 'thumb';

  let media;
  if (isVideo(filename)) {
    media = document.createElement('video');
    media.src = url;
    media.autoplay = true;
    media.muted = true;
    media.loop = true;
    media.playsInline = true;
    media.preload = 'metadata';
  } else {
    media = document.createElement('img');
    media.loading = 'lazy';
    media.src = url;
    media.alt = filename;
    media.onload = () => media.classList.add('loaded');
  }

  card.appendChild(media);
  card.addEventListener('click', () => openLightbox(url, filename));
  return card;
}

function buildFlowCard(flowId, files, name) {
  const firstFile = files[0];
  const { data: { publicUrl } } = supabase.storage.from(BUCKET).getPublicUrl(firstFile.name);
  const card = document.createElement('div');
  card.className = 'thumb flow-card';

  let media;
  if (isVideo(firstFile.name)) {
    media = document.createElement('video');
    media.src = publicUrl;
    media.autoplay = true; media.muted = true; media.loop = true;
    media.playsInline = true; media.preload = 'metadata';
  } else {
    media = document.createElement('img');
    media.loading = 'lazy'; media.src = publicUrl; media.alt = name;
    media.onload = () => media.classList.add('loaded');
  }

  const badge = document.createElement('div');
  badge.className = 'flow-badge';
  badge.textContent = files.length;

  const thumbsRow = document.createElement('div');
  thumbsRow.className = 'flow-thumbs';
  const previewFiles = files.slice(1, 5); // hasta 4 miniaturas (sin la portada)
  for (const f of previewFiles) {
    const { data: { publicUrl: miniUrl } } = supabase.storage.from(BUCKET).getPublicUrl(f.name);
    let mini;
    if (isVideo(f.name)) {
      mini = document.createElement('video');
      mini.src = miniUrl; mini.muted = true; mini.preload = 'metadata';
    } else {
      mini = document.createElement('img');
      mini.loading = 'lazy'; mini.src = miniUrl;
    }
    mini.className = 'flow-thumb-mini';
    thumbsRow.appendChild(mini);
  }

  card.append(media, badge, thumbsRow);
  card.addEventListener('click', () => openFlowLightbox(flowId, files));
  return card;
}

// ── Filter bar ────────────────────────────────────────────────────────────────

const subtagBar = document.getElementById('subtag-bar');

function matchesFilter(tags, filter) {
  if (!filter) return true;
  return tags.includes(filter) || tags.some(t => t.startsWith(filter + '/'));
}

function applyFilter() {
  thumbRegistry.forEach(({ el, filename, isFlow, flowFilenames }) => {
    el.style.display = (!currentFilter || (isFlow
      ? (flowFilenames || []).some(fn => matchesFilter(metaMap[fn] || [], currentFilter))
      : matchesFilter(metaMap[filename] || [], currentFilter)
    )) ? '' : 'none';
  });
  showDescPanel(currentFilter);
}

function buildFilterBar() {
  const allTags = new Set(Object.values(metaMap).flat());
  filterBar.innerHTML = '';
  if (!allTags.size) return;

  addFilterBtn('All', null, currentFilter === null);

  const shown = new Set();
  for (const tag of [...allTags].sort()) {
    const key = tag.includes('/') ? tag.split('/')[0] : tag;
    if (shown.has(key)) continue;
    shown.add(key);
    const hasChildren = [...allTags].some(t => t.startsWith(key + '/'));
    const isActive = currentFilter === key || (currentFilter != null && currentFilter.startsWith(key + '/'));
    addFilterBtn(key, key, isActive, hasChildren);
  }

  buildSubtagBar();
}

function buildSubtagBar() {
  subtagBar.innerHTML = '';
  if (!currentFilter) { subtagBar.classList.remove('visible'); return; }

  const allTags = new Set(Object.values(metaMap).flat());
  const parentTag = currentFilter.includes('/') ? currentFilter.split('/')[0] : currentFilter;
  const children = [...allTags].filter(t => t.startsWith(parentTag + '/')).sort();

  if (!children.length) { subtagBar.classList.remove('visible'); return; }

  subtagBar.classList.add('visible');

  const allBtn = document.createElement('button');
  allBtn.className = 'subtag-btn' + (!currentFilter.includes('/') ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => {
    currentFilter = parentTag;
    applyFilter();
    buildFilterBar();
  });
  subtagBar.appendChild(allBtn);

  for (const child of children) {
    const childPart = child.slice(parentTag.length + 1);
    const btn = document.createElement('button');
    btn.className = 'subtag-btn' + (currentFilter === child ? ' active' : '');
    btn.textContent = childPart;
    btn.addEventListener('click', () => {
      currentFilter = child;
      applyFilter();
      buildFilterBar();
    });
    subtagBar.appendChild(btn);
  }
}

function addFilterBtn(label, tag, active, hasChildren) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (active ? ' active' : '') + (hasChildren ? ' has-children' : '');
  btn.textContent = label;
  btn.addEventListener('click', () => {
    currentFilter = tag;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
    buildSubtagBar();
  });
  filterBar.appendChild(btn);
}

// ── Tag description panel ─────────────────────────────────────────────────────

const descPanel    = document.getElementById('tag-desc-panel');
const descText     = document.getElementById('tag-desc-text');
const descEditBtn  = document.getElementById('tag-desc-edit');
const descDlg      = document.getElementById('desc-editor');
const descTextarea = document.getElementById('desc-textarea');

function autoLink(text) {
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function showDescPanel(tag) {
  if (!tag) { descPanel.classList.remove('visible'); return; }
  descPanel.classList.add('visible');
  document.getElementById('tag-desc-title').textContent = tag;
  const desc = tagDescMap[tag] || '';
  if (desc) {
    descText.innerHTML = autoLink(desc);
    descText.classList.remove('empty');
  } else {
    descText.textContent = 'Sin descripción — pulsa ✎ para añadir una.';
    descText.classList.add('empty');
  }
}

descEditBtn.addEventListener('click', () => {
  if (!currentFilter) return;
  document.getElementById('desc-editor-title').textContent = currentFilter;
  descTextarea.value = tagDescMap[currentFilter] || '';
  descDlg.showModal();
});

document.getElementById('desc-cancel').addEventListener('click', () => descDlg.close());

document.getElementById('desc-save').addEventListener('click', async () => {
  const val = descTextarea.value.trim();
  const { error } = await supabase.from('tag_meta').upsert({ tag: currentFilter, description: val });
  if (!error) {
    tagDescMap[currentFilter] = val;
    showDescPanel(currentFilter);
    descDlg.close();
  }
});

// ── Lightbox ──────────────────────────────────────────────────────────────────

function openLightbox(url, filename) {
  lbFilename = filename;
  lbName.textContent = filename;
  renderLbTags(metaMap[filename] || []);
  renderLbNotes(filename);
  if (isVideo(filename)) {
    lbImg.style.display = 'none';
    lbVideo.src = url;
    lbVideo.style.display = 'block';
  } else {
    lbImg.src = url;
    lbImg.style.display = '';
    lbVideo.style.display = 'none';
    lbVideo.pause();
    lbVideo.src = '';
  }
  lb.showModal();
}

function renderLbNotes(filename) {
  lbNotesWrap.innerHTML = '';
  const notes = notesMap[filename] || '';
  if (notes) {
    const p = document.createElement('p');
    p.className = 'lb-notes-text';
    p.textContent = notes;
    p.addEventListener('click', () => showNotesEditor(filename));
    lbNotesWrap.appendChild(p);
  } else {
    const btn = document.createElement('button');
    btn.className = 'lb-notes-empty';
    btn.textContent = '+ add note';
    btn.addEventListener('click', () => showNotesEditor(filename));
    lbNotesWrap.appendChild(btn);
  }
}

function showNotesEditor(filename) {
  lbNotesWrap.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.id = 'lb-notes-textarea';
  ta.value = notesMap[filename] || '';
  ta.placeholder = 'Add a note…';

  const row = document.createElement('div');
  row.className = 'lb-notes-row';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'te-cancel';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => renderLbNotes(filename));

  const saveBtn = document.createElement('button');
  saveBtn.className = 'te-save';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', async () => {
    const val = ta.value.trim();
    const { error } = await supabase.from('image_meta').upsert({
      filename,
      tags: metaMap[filename] || [],
      notes: val
    });
    if (!error) {
      notesMap[filename] = val;
      renderLbNotes(filename);
    }
  });

  row.append(cancelBtn, saveBtn);
  lbNotesWrap.append(ta, row);
  ta.focus();
}

function renderLbTags(tags) {
  lbTags.innerHTML = '';
  for (const tag of tags) {
    const chip = document.createElement('span');
    chip.className = 'lb-tag';
    chip.textContent = tag;
    chip.addEventListener('click', () => {
      lb.close();
      filterByTag(tag);
    });
    lbTags.appendChild(chip);
  }
}

function filterByTag(tag) {
  currentFilter = tag;
  buildFilterBar();
  applyFilter();
}

document.getElementById('lb-close').addEventListener('click', () => lb.close());
lb.addEventListener('click', e => { if (e.target === lb || e.target.id === 'lb-wrap') lb.close(); });
lb.addEventListener('close', () => { lbVideo.pause(); lbVideo.src = ''; });

lbEditBtn.addEventListener('click', e => {
  e.stopPropagation();
  openEditor(lbFilename);
});

document.getElementById('lb-delete-btn').addEventListener('click', async e => {
  e.stopPropagation();
  if (!confirm(`Delete "${lbFilename}"?`)) return;

  await Promise.all([
    supabase.storage.from(BUCKET).remove([lbFilename]),
    supabase.from('image_meta').delete().eq('filename', lbFilename)
  ]);

  // Remove thumb from DOM and registry
  const idx = thumbRegistry.findIndex(t => t.filename === lbFilename);
  if (idx > -1) {
    thumbRegistry[idx].el.remove();
    thumbRegistry.splice(idx, 1);
  }
  delete metaMap[lbFilename];
  buildFilterBar();
  lb.close();
});

// ── Tag editor ────────────────────────────────────────────────────────────────

function openEditor(filename) {
  editTags = [...(metaMap[filename] || [])];
  teInput.value = '';
  renderEditorSuggestions();
  renderEditorChips();
  tagDlg.showModal();
}

function syncSuggestionStates() {
  teSuggestions.querySelectorAll('.te-suggestion').forEach(btn => {
    btn.classList.toggle('active', editTags.includes(btn.textContent));
  });
}

function renderEditorSuggestions() {
  teSuggestions.innerHTML = '';
  for (const tag of getAllTags()) {
    const btn = document.createElement('button');
    btn.className = 'te-suggestion' + (editTags.includes(tag) ? ' active' : '');
    btn.textContent = tag;
    btn.addEventListener('click', () => {
      if (editTags.includes(tag)) {
        editTags = editTags.filter(t => t !== tag);
      } else {
        editTags.push(tag);
      }
      btn.classList.toggle('active', editTags.includes(tag));
      renderEditorChips();
    });
    teSuggestions.appendChild(btn);
  }
}

function renderEditorChips() {
  teChips.innerHTML = '';
  for (const tag of editTags) {
    const chip = document.createElement('div');
    chip.className = 'te-chip';

    const lbl = document.createElement('span');
    lbl.textContent = tag;

    const editBtn = document.createElement('button');
    editBtn.className = 'te-chip-edit';
    editBtn.textContent = '✎';
    editBtn.title = 'Renombrar tag (global)';
    editBtn.addEventListener('click', async e => {
      e.stopPropagation();
      const newName = window.prompt(`Renombrar "${tag}":`, tag);
      if (!newName) return;
      const newTag = newName.trim().toLowerCase();
      if (!newTag || newTag === tag) return;
      await renameTagGlobally(tag, newTag);
      editTags = editTags.map(t => t === tag ? newTag : t);
      renderEditorChips();
      renderEditorSuggestions();
    });

    const rm = document.createElement('button');
    rm.className = 'te-chip-rm';
    rm.textContent = '×';
    rm.addEventListener('click', () => {
      editTags = editTags.filter(t => t !== tag);
      renderEditorChips();
      syncSuggestionStates();
    });

    chip.append(lbl, editBtn, rm);
    teChips.appendChild(chip);
  }
}


async function renameTagGlobally(oldTag, newTag) {
  const affected = Object.entries(metaMap).filter(([, tags]) => tags.includes(oldTag));

  await Promise.all(
    affected.map(([filename, tags]) =>
      supabase.from('image_meta').update({ tags: tags.map(t => t === oldTag ? newTag : t) }).eq('filename', filename)
    )
  );

  if (oldTag in tagDescMap) {
    await Promise.all([
      supabase.from('tag_meta').delete().eq('tag', oldTag),
      supabase.from('tag_meta').upsert({ tag: newTag, description: tagDescMap[oldTag] })
    ]);
    tagDescMap[newTag] = tagDescMap[oldTag];
    delete tagDescMap[oldTag];
  }

  for (const [filename] of affected) {
    metaMap[filename] = metaMap[filename].map(t => t === oldTag ? newTag : t);
  }

  if (currentFilter === oldTag) currentFilter = newTag;
  else if (currentFilter?.startsWith(oldTag + '/')) currentFilter = newTag + currentFilter.slice(oldTag.length);

  buildFilterBar();
}

function commitTag() {
  const val = teInput.value.trim().toLowerCase();
  if (!val || editTags.includes(val)) { teInput.value = ''; return; }
  editTags.push(val);
  teInput.value = '';
  renderEditorChips();
  syncSuggestionStates();
}

document.getElementById('te-add').addEventListener('click', commitTag);
teInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); commitTag(); } });
document.getElementById('te-cancel').addEventListener('click', () => tagDlg.close());

let onTagSaveCallback = null;

document.getElementById('te-save').addEventListener('click', async () => {
  const { error } = await supabase.from('image_meta').upsert({ filename: lbFilename, tags: editTags });
  if (!error) {
    metaMap[lbFilename] = editTags;
    renderLbTags(editTags);
    if (onTagSaveCallback) { onTagSaveCallback(); onTagSaveCallback = null; }
    buildFilterBar();
    tagDlg.close();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { lb.close(); tagDlg.close(); flowLb.close(); }
});

// ── Flow lightbox ─────────────────────────────────────────────────────────────

const flowLb    = document.getElementById('flow-lb');
const flowTrack = document.getElementById('flow-track');

let currentFlowFiles = [];
let currentFlowId    = null;

function buildFlowSlide(file) {
  const { data: { publicUrl } } = supabase.storage.from(BUCKET).getPublicUrl(file.name);
  const slide = document.createElement('div');
  slide.className = 'flow-slide';

  let media;
  if (isVideo(file.name)) {
    media = document.createElement('video');
    media.src = publicUrl; media.controls = true; media.playsInline = true;
  } else {
    media = document.createElement('img');
    media.src = publicUrl; media.loading = 'lazy';
  }

  const footer = document.createElement('div');
  footer.className = 'flow-slide-footer';

  const tagsEl = document.createElement('div');
  tagsEl.className = 'flow-slide-tags';
  const renderSlideTags = () => {
    tagsEl.innerHTML = '';
    for (const tag of (metaMap[file.name] || [])) {
      const chip = document.createElement('span');
      chip.className = 'lb-tag'; chip.textContent = tag;
      chip.addEventListener('click', () => { flowLb.close(); filterByTag(tag); });
      tagsEl.appendChild(chip);
    }
  };
  renderSlideTags();

  const actions = document.createElement('div');
  actions.className = 'flow-slide-actions';

  const editBtn = document.createElement('button');
  editBtn.className = 'flow-slide-edit-btn'; editBtn.textContent = '✏ Edit tags';
  editBtn.addEventListener('click', e => {
    e.stopPropagation();
    lbFilename = file.name;
    onTagSaveCallback = () => renderSlideTags();
    openEditor(file.name);
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'flow-slide-del-btn'; delBtn.textContent = 'Delete';
  delBtn.addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Delete "${file.name}"?`)) return;
    const filename = file.name;

    await Promise.all([
      supabase.storage.from(BUCKET).remove([filename]),
      supabase.from('image_meta').delete().eq('filename', filename)
    ]);

    delete metaMap[filename]; delete notesMap[filename]; delete fileFlowMap[filename];
    const wasCover = currentFlowFiles[0]?.name === filename;
    currentFlowFiles = currentFlowFiles.filter(f => f.name !== filename);
    slide.remove();

    const regIdx = thumbRegistry.findIndex(t => t.flowId === currentFlowId);
    if (currentFlowFiles.length === 0) {
      if (regIdx > -1) { thumbRegistry[regIdx].el.remove(); thumbRegistry.splice(regIdx, 1); }
      flowLb.close(); buildFilterBar(); return;
    }
    if (regIdx > -1) {
      thumbRegistry[regIdx].flowFilenames = currentFlowFiles.map(f => f.name);
      const badge = thumbRegistry[regIdx].el.querySelector('.flow-badge');
      if (badge) badge.textContent = currentFlowFiles.length;
      if (wasCover) {
        const newFirst = currentFlowFiles[0];
        const { data: { publicUrl: pu } } = supabase.storage.from(BUCKET).getPublicUrl(newFirst.name);
        const card = thumbRegistry[regIdx].el;
        const old = card.querySelector('img, video');
        if (isVideo(newFirst.name)) {
          const v = document.createElement('video');
          v.src = pu; v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true; v.preload = 'metadata';
          old?.replaceWith(v);
        } else {
          const img = document.createElement('img');
          img.loading = 'lazy'; img.src = pu;
          img.onload = () => img.classList.add('loaded');
          old?.replaceWith(img);
        }
      }
    }
    buildFilterBar();
  });

  actions.append(editBtn, delBtn);
  footer.append(tagsEl, actions);
  slide.append(media, footer);
  return slide;
}

function openFlowLightbox(flowId, files) {
  currentFlowId    = flowId;
  currentFlowFiles = [...files];
  flowTrack.innerHTML = '';
  for (const file of files) flowTrack.appendChild(buildFlowSlide(file));
  flowLb.showModal();
  flowTrack.scrollLeft = 0;
}

document.getElementById('flow-lb-close').addEventListener('click', () => flowLb.close());
flowLb.addEventListener('click', e => { if (e.target === flowLb) flowLb.close(); });
flowLb.addEventListener('close', () => { flowTrack.querySelectorAll('video').forEach(v => v.pause()); });

// ── Tags Manager ──────────────────────────────────────────────────────────────

const tagsMgr    = document.getElementById('tags-manager');
const tmList     = document.getElementById('tm-list');
const tmNewName  = document.getElementById('tm-new-name');

function getAllTags() {
  const all = new Set([...Object.values(metaMap).flat(), ...Object.keys(tagDescMap)]);
  return [...all].sort();
}

function imageCountForTag(tag) {
  return Object.values(metaMap).filter(tags => tags.includes(tag)).length;
}

function renderTagsManager() {
  const tags = getAllTags();
  tmList.innerHTML = '';
  if (!tags.length) {
    tmList.innerHTML = '<p class="tm-empty">No hay tags todavía.</p>';
    return;
  }
  for (const tag of tags) tmList.appendChild(buildTagRow(tag));
}

function buildTagRow(tag) {
  const count = imageCountForTag(tag);
  const desc  = tagDescMap[tag] || '';

  const row = document.createElement('div');
  row.className = 'tm-row';

  const top = document.createElement('div');
  top.className = 'tm-row-top';

  const nameEl = document.createElement('span');
  nameEl.className = 'tm-tag-name';
  nameEl.textContent = tag;

  const countEl = document.createElement('span');
  countEl.className = 'tm-tag-count';
  countEl.textContent = count === 1 ? '1 img' : `${count} imgs`;

  const actions = document.createElement('div');
  actions.className = 'tm-row-actions';

  const renameBtn = document.createElement('button');
  renameBtn.className = 'tm-rename-btn';
  renameBtn.title = 'Renombrar tag';
  renameBtn.textContent = 'rename';

  const editBtn = document.createElement('button');
  editBtn.className = 'tm-edit-btn';
  editBtn.title = 'Editar descripción';
  editBtn.textContent = '✎';

  const delBtn = document.createElement('button');
  delBtn.className = 'tm-del-btn';
  delBtn.title = 'Eliminar tag';
  delBtn.textContent = '×';

  actions.append(renameBtn, editBtn, delBtn);
  top.append(nameEl, countEl, actions);

  const descView = document.createElement('div');
  descView.className = 'tm-desc-view' + (desc ? ' has-content' : '');
  descView.textContent = desc || 'Sin descripción';

  const descEdit = document.createElement('div');
  descEdit.className = 'tm-desc-edit';
  descEdit.style.display = 'none';

  const ta = document.createElement('textarea');
  ta.className = 'tm-desc-ta';
  ta.value = desc;
  ta.placeholder = 'Descripción… las URLs se convierten en links automáticamente.';

  const editActions = document.createElement('div');
  editActions.className = 'tm-edit-actions';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.className = 'te-cancel';

  const saveBtn = document.createElement('button');
  saveBtn.textContent = 'Save';
  saveBtn.className = 'te-save';

  editActions.append(cancelBtn, saveBtn);
  descEdit.append(ta, editActions);
  row.append(top, descView, descEdit);

  renameBtn.addEventListener('click', async () => {
    const newName = window.prompt(`Renombrar "${tag}":`, tag);
    if (!newName) return;
    const newTag = newName.trim().toLowerCase();
    if (!newTag || newTag === tag) return;
    await renameTagGlobally(tag, newTag);
    renderTagsManager();
  });

  editBtn.addEventListener('click', () => {
    descView.style.display = 'none';
    descEdit.style.display = 'block';
    ta.focus();
  });

  cancelBtn.addEventListener('click', () => {
    descView.style.display = '';
    descEdit.style.display = 'none';
    ta.value = tagDescMap[tag] || '';
  });

  saveBtn.addEventListener('click', async () => {
    const val = ta.value.trim();
    const { error } = await supabase.from('tag_meta').upsert({ tag, description: val });
    if (!error) {
      tagDescMap[tag] = val;
      descView.textContent = val || 'Sin descripción';
      descView.classList.toggle('has-content', !!val);
      descView.style.display = '';
      descEdit.style.display = 'none';
      if (currentFilter === tag) showDescPanel(tag);
    }
  });

  delBtn.addEventListener('click', async () => {
    if (!confirm(`¿Eliminar el tag "${tag}"? Se quitará de todas las imágenes.`)) return;

    const affected = Object.entries(metaMap).filter(([, tags]) => tags.includes(tag));

    await Promise.all([
      ...affected.map(([filename, tags]) =>
        supabase.from('image_meta').update({ tags: tags.filter(t => t !== tag) }).eq('filename', filename)
      ),
      supabase.from('tag_meta').delete().eq('tag', tag)
    ]);

    for (const [filename] of affected) {
      metaMap[filename] = metaMap[filename].filter(t => t !== tag);
    }
    delete tagDescMap[tag];
    row.remove();
    if (!tmList.children.length) tmList.innerHTML = '<p class="tm-empty">No hay tags todavía.</p>';

    buildFilterBar();
    if (currentFilter === tag) {
      currentFilter = null;
      showDescPanel(null);
      thumbRegistry.forEach(({ el }) => { el.style.display = ''; });
    }
  });

  return row;
}

async function addNewTag() {
  const name = tmNewName.value.trim().toLowerCase();
  if (!name) return;
  if (getAllTags().includes(name)) { tmNewName.value = ''; return; }

  const { error } = await supabase.from('tag_meta').upsert({ tag: name, description: '' });
  if (!error) {
    tagDescMap[name] = '';
    tmNewName.value = '';
    renderTagsManager();
    buildFilterBar();
  }
}

document.getElementById('tags-manager-btn').addEventListener('click', () => {
  renderTagsManager();
  tagsMgr.showModal();
});
document.getElementById('tm-close').addEventListener('click', () => tagsMgr.close());
tagsMgr.addEventListener('click', e => { if (e.target === tagsMgr) tagsMgr.close(); });
document.getElementById('tm-new-add').addEventListener('click', addNewTag);
tmNewName.addEventListener('keydown', e => { if (e.key === 'Enter') addNewTag(); });

load();

// ── Global drag-to-upload ─────────────────────────────────────────────────────

function isMediaFile(f) {
  return /^(image|video)\//i.test(f.type) ||
    /\.(png|jpe?g|gif|webp|avif|svg|mp4|webm|mov|m4v|ogv)$/i.test(f.name);
}

const dropOverlay = document.getElementById('drop-overlay');
let dragTimer;

document.addEventListener('dragover', e => {
  e.preventDefault();
  if (e.dataTransfer.types.includes('Files')) {
    dropOverlay.classList.add('active');
    clearTimeout(dragTimer);
    dragTimer = setTimeout(() => dropOverlay.classList.remove('active'), 120);
  }
});

document.addEventListener('drop', e => {
  e.preventDefault();
  clearTimeout(dragTimer);
  dropOverlay.classList.remove('active');
  const files = [...e.dataTransfer.files].filter(isMediaFile);
  if (!files.length) return;
  openUploadModal(files);
});

// ── Upload modal ──────────────────────────────────────────────────────────────

const uploadModal   = document.getElementById('upload-modal');
const umDropZone    = document.getElementById('um-drop-zone');
const umFileInput   = document.getElementById('um-file-input');
const umTagSugg     = document.getElementById('um-tag-suggestions');
const umChipsEl     = document.getElementById('um-chips');
const umTagInput    = document.getElementById('um-tag-input');
const umTagsSect    = document.getElementById('um-tags-section');
const umFlowSect    = document.getElementById('um-flow-section');
const umFlowToggle  = document.getElementById('um-flow-toggle');
const umFlowName    = document.getElementById('um-flow-name');
const umPreviews    = document.getElementById('um-previews');
const umActions     = document.getElementById('um-actions');
const umUploadBtn   = document.getElementById('um-upload-btn');
const umStatus      = document.getElementById('um-status');

let umQueue     = [];
let umTags      = [];
let umFlowMode  = false;
let umDidUpload = false;

function openUploadModal(files) {
  umQueue = []; umTags = []; umFlowMode = false; umDidUpload = false;
  umFlowToggle.classList.remove('on');
  umFlowName.classList.remove('visible'); umFlowName.value = '';
  umPreviews.innerHTML = '';
  umActions.style.display = 'none';
  umTagsSect.style.display = 'none';
  umFlowSect.style.display = 'none';
  umStatus.textContent = '';
  umChipsEl.innerHTML = '';
  umTagInput.value = '';
  umUploadBtn.disabled = false;
  renderUmSuggestions();
  uploadModal.showModal();
  if (files?.length) umAddFiles(files);
}

function renderUmSuggestions() {
  umTagSugg.innerHTML = '';
  for (const tag of getAllTags()) {
    const btn = document.createElement('button');
    btn.className = 'tag-suggestion' + (umTags.includes(tag) ? ' active' : '');
    btn.textContent = tag;
    btn.addEventListener('click', () => {
      umTags.includes(tag) ? (umTags = umTags.filter(t => t !== tag)) : umTags.push(tag);
      btn.classList.toggle('active', umTags.includes(tag));
      renderUmChips();
    });
    umTagSugg.appendChild(btn);
  }
}

function renderUmChips() {
  umChipsEl.innerHTML = '';
  for (const tag of umTags) {
    const chip = document.createElement('div'); chip.className = 'tags-chip';
    const lbl = document.createElement('span'); lbl.textContent = tag;
    const rm = document.createElement('button'); rm.className = 'tags-chip-rm'; rm.textContent = '×';
    rm.addEventListener('click', () => {
      umTags = umTags.filter(t => t !== tag); renderUmChips();
      umTagSugg.querySelectorAll('.tag-suggestion').forEach(b => b.classList.toggle('active', umTags.includes(b.textContent)));
    });
    chip.append(lbl, rm); umChipsEl.appendChild(chip);
  }
}

function addUmTag() {
  const val = umTagInput.value.trim().toLowerCase();
  if (!val || umTags.includes(val)) { umTagInput.value = ''; return; }
  umTags.push(val); umTagInput.value = '';
  renderUmChips();
  umTagSugg.querySelectorAll('.tag-suggestion').forEach(b => b.classList.toggle('active', umTags.includes(b.textContent)));
}

umTagInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addUmTag(); } });

umFlowToggle.addEventListener('click', () => {
  umFlowMode = !umFlowMode;
  umFlowToggle.classList.toggle('on', umFlowMode);
  umFlowName.classList.toggle('visible', umFlowMode);
});

function umFormatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 ** 2) return (b / 1024).toFixed(0) + ' KB';
  return (b / 1024 ** 2).toFixed(1) + ' MB';
}

function umUniqueName(name) {
  const ts = new Date().toISOString().replace(/[-:.TZ]/g, '').slice(0, 14);
  const dot = name.lastIndexOf('.');
  const base = dot > -1 ? name.slice(0, dot) : name;
  const ext  = dot > -1 ? name.slice(dot) : '';
  return `ref_${ts}_${base}${ext}`;
}

function umAddFiles(files) {
  for (const file of files) {
    const isMedia = /^(image|video)\//i.test(file.type) ||
      /\.(png|jpe?g|gif|webp|avif|svg|mp4|webm|mov|m4v|ogv)$/i.test(file.name);
    if (!isMedia) continue;

    const item = document.createElement('div'); item.className = 'um-preview-item';
    let thumb;
    if (/^video\//i.test(file.type)) {
      thumb = document.createElement('video');
      thumb.src = URL.createObjectURL(file); thumb.muted = true; thumb.preload = 'metadata';
    } else {
      thumb = document.createElement('img');
      thumb.src = URL.createObjectURL(file);
    }
    const info = document.createElement('div'); info.className = 'um-preview-info';
    const nameEl = document.createElement('div'); nameEl.className = 'um-preview-name'; nameEl.textContent = file.name;
    const sizeEl = document.createElement('div'); sizeEl.className = 'um-preview-size'; sizeEl.textContent = umFormatBytes(file.size);
    const barWrap = document.createElement('div'); barWrap.className = 'um-preview-bar-wrap';
    const bar = document.createElement('div'); bar.className = 'um-preview-bar'; barWrap.appendChild(bar);
    info.append(nameEl, sizeEl, barWrap);
    const stateEl = document.createElement('div'); stateEl.className = 'um-preview-state'; stateEl.textContent = 'Ready';
    item.append(thumb, info, stateEl);
    umPreviews.appendChild(item);
    umQueue.push({ file, bar, stateEl });
  }
  if (umQueue.length > 0) {
    umActions.style.display = 'block';
    umTagsSect.style.display = 'block';
    umFlowSect.style.display = 'block';
  }
}

umDropZone.addEventListener('dragover', e => { e.preventDefault(); umDropZone.classList.add('over'); });
umDropZone.addEventListener('dragleave', () => umDropZone.classList.remove('over'));
umDropZone.addEventListener('drop', e => { e.preventDefault(); umDropZone.classList.remove('over'); umAddFiles(e.dataTransfer.files); });
umFileInput.addEventListener('change', () => { umAddFiles(umFileInput.files); umFileInput.value = ''; });

umUploadBtn.addEventListener('click', async () => {
  const pending = umQueue.filter(q => q.stateEl.textContent === 'Ready');
  if (!pending.length) return;

  umUploadBtn.disabled = true;
  umStatus.textContent = `Uploading ${pending.length} file${pending.length > 1 ? 's' : ''}…`;

  let flowId = null;
  if (umFlowMode && pending.length > 0) {
    flowId = 'flow_' + Date.now();
    const { error: flowErr } = await supabase.from('flows').upsert({ id: flowId, name: umFlowName.value.trim() });
    if (flowErr) { umStatus.textContent = 'Error creating flow: ' + flowErr.message; umUploadBtn.disabled = false; return; }
  }

  let done = 0;
  for (const item of pending) {
    item.stateEl.textContent = '…'; item.bar.style.width = '30%';
    const targetName = umUniqueName(item.file.name);
    const { error } = await supabase.storage.from(BUCKET).upload(targetName, item.file, { cacheControl: '3600', upsert: false });
    item.bar.style.width = '100%';
    if (error) {
      item.stateEl.textContent = 'Error'; item.stateEl.classList.add('err');
    } else {
      if (umTags.length > 0 || flowId) {
        const meta = { filename: targetName, tags: umTags };
        if (flowId) meta.flow_id = flowId;
        await supabase.from('image_meta').upsert(meta);
      }
      item.stateEl.textContent = 'Done ✓'; item.stateEl.classList.add('ok');
      done++; umDidUpload = true;
    }
  }

  umStatus.textContent = `${done} of ${pending.length} uploaded.`;
  umUploadBtn.disabled = false;
  umQueue = umQueue.filter(q => q.stateEl.textContent === 'Error');
});

document.getElementById('open-upload-btn').addEventListener('click', () => openUploadModal());
document.getElementById('um-close').addEventListener('click', () => uploadModal.close());
uploadModal.addEventListener('click', e => { if (e.target === uploadModal) uploadModal.close(); });
uploadModal.addEventListener('close', () => { if (umDidUpload) load(); });
</script>
